<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phishing Awareness Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background-color: #1a1a1a;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 30px;
      max-width: 700px;
      width: 90%;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    h1 {
      color: #fff;
      margin-bottom: 25px;
      font-size: 1.8rem;
    }

    #quiz {
      margin-bottom: 25px;
    }

    .question {
      margin-bottom: 20px;
    }

    .question h3 {
      color: #fff;
      margin-bottom: 10px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .options label {
      background: #1a1a1a;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid #333;
      transition: 0.3s ease;
    }

    .options label:hover {
      background: #222;
    }

    input[type="radio"] {
      margin-right: 10px;
    }

    #results {
      font-weight: 600;
      color: #f5f5f5;
      margin-top: 15px;
    }

    button {
      display: inline-block;
      margin: 10px;
      padding: 12px 28px;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      background: #fff;
      color: #000;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #f1f1f1;
    }

    button:disabled {
      background: #888;
      color: #333;
      cursor: not-allowed;
    }

   
  </style>
</head>

<body>
  <div class="container">
    <h1>Phishing Awareness Quiz</h1>
    <div id="quiz"></div>
    <div id="results"></div>
    <div>
      <button id="next" disabled>Next</button>
      <button id="restart" style="display:none;">Restart Quiz</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "You get an email from your bank asking to verify your password using a link. What should you do?",
        options: [
          "Click the link and verify immediately.",
          "Ignore the email or contact your bank directly.",
          "Forward it to your friends to warn them.",
          "Reply to the email asking for confirmation."
        ],
        correct: 1
      },
      {
        question: "The sender address looks suspicious (e.g., support@secure-go0gle.com). What’s your next move?",
        options: [
          "Trust it, since it has the word 'Google'.",
          "Delete it or report it as phishing.",
          "Open it to see if it’s real.",
          "Reply to confirm authenticity."
        ],
        correct: 1
      },
      {
        question: "A text message says you won a prize and asks for your credit card info. You should:",
        options: [
          "Provide your details to claim it.",
          "Ignore or delete it.",
          "Click the link to check.",
          "Share it on social media."
        ],
        correct: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const quizContainer = document.getElementById("quiz");
    const resultsContainer = document.getElementById("results");
    const nextBtn = document.getElementById("next");
    const restartBtn = document.getElementById("restart");

    function showQuestion() {
      const q = quizData[currentQuestion];
      quizContainer.innerHTML = `
        <div class="question">
          <h3>${q.question}</h3>
          <div class="options">
            ${q.options.map((option, index) => `
              <label>
                <input type="radio" name="question" value="${index}">
                ${option}
              </label>
            `).join('')}
          </div>
        </div>
      `;

      nextBtn.disabled = true;

      document.querySelectorAll('input[name="question"]').forEach(input => {
        input.addEventListener("change", () => (nextBtn.disabled = false));
      });
    }

    function showResults() {
      quizContainer.innerHTML = "";
      resultsContainer.innerHTML = `🎯 You scored ${score} / ${quizData.length}`;
      nextBtn.style.display = "none";
      restartBtn.style.display = "inline-block";
    }

    nextBtn.addEventListener("click", () => {
      const selected = document.querySelector('input[name="question"]:checked');
      if (!selected) return;

      const answer = parseInt(selected.value);
      if (answer === quizData[currentQuestion].correct) score++;

      currentQuestion++;

      if (currentQuestion < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    });

    restartBtn.addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      resultsContainer.innerHTML = "";
      restartBtn.style.display = "none";
      nextBtn.style.display = "inline-block";
      showQuestion();
    });

    showQuestion();
  </script>
</body>
</html>
